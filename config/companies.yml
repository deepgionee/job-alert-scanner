# ── Companies to watch ────────────────────────────────────────────────────────
# ATS options:
#   greenhouse    ->  fast, uses boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   lever         ->  fast, uses api.lever.co/v0/postings/{slug}
#   ashby         ->  fast, uses api.ashbyhq.com/posting-api/job-board/{slug}
#   peoplestrong  ->  for PeopleStrong portals (direct API probe + Playwright fallback)
#                     REQUIRES: url field
#   playwright    ->  any JS-rendered site
#                     REQUIRES: url field
# ─────────────────────────────────────────────────────────────────────────────

companies:

  # ── Lever ATS ─────────────────────────────────────────────────────────────
  - slug: mistral
    ats: lever

  # ── Greenhouse ATS ────────────────────────────────────────────────────────
  - slug: figma
    ats: greenhouse

  - slug: stripe
    ats: greenhouse

  # ── PeopleStrong portals ──────────────────────────────────────────────────
  - slug: care-hospital
    ats: peoplestrong
    url: https://carecareers.peoplestrong.com/job/joblist

