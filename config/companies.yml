# ── Companies to watch ────────────────────────────────────────────────────────
# ATS options:
#   greenhouse  →  fast, uses boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   lever       →  fast, uses api.lever.co/v0/postings/{slug}
#   ashby       →  fast, uses api.ashbyhq.com/posting-api/job-board/{slug}
#   playwright  →  slower (~30s), headless Chrome for JS-rendered pages
#                  REQUIRES: url field set to the full careers page URL
# ─────────────────────────────────────────────────────────────────────────────

companies:

  # ── AI / Tech companies (Ashby ATS) ──────────────────────────────────────
  - slug: perplexity
    ats: ashby

  - slug: elevenlabs
    ats: ashby

  - slug: harvey
    ats: ashby

  # ── Lever ATS ─────────────────────────────────────────────────────────────
  - slug: mistral
    ats: lever

  - slug: linear
    ats: lever

  - slug: vercel
    ats: lever

  # ── Greenhouse ATS ────────────────────────────────────────────────────────
  - slug: notion
    ats: greenhouse

  - slug: figma
    ats: greenhouse

  - slug: stripe
    ats: greenhouse

  # ── Playwright — JS-rendered career portals (no public API) ───────────────
  # Uses headless Chrome to intercept the internal API the page calls.

  - slug: care-hospital
    ats: playwright
    url: https://carecareers.peoplestrong.com/job/joblist

  # ── Add more companies below ──────────────────────────────────────────────
  # Fast (API):
  # - slug: your-company
  #   ats: greenhouse   # or lever, ashby
  #
  # Any JS-rendered site:
  # - slug: any-company
  #   ats: playwright
  #   url: https://company.com/careers
