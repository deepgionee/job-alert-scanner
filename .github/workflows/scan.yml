name: Job Alert Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml playwright

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run job scanner
        run: python cli.py --scan
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Save seen-jobs state back to repo
        run: |
          git config user.name  "Job Scanner Bot"
          git config user.email "bot@github.com"
          git add data/seen_jobs.json || true
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push || true
